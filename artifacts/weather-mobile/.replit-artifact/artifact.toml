kind = "mobile"
previewPath = "/mobile/"
title = "Microclimate Android App"
version = "1.0.0"
id = "artifacts/weather-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18126

[services.development]
run = "pnpm --filter @workspace/weather-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/weather-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/weather-mobile", "run", "serve" ]

[services.env]
PORT = "18126"
BASE_PATH = "/mobile/"
