openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Microclimate AI Weather Predictor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: weather
    description: Weather prediction operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /weather:
    get:
      operationId: getWeather
      tags: [weather]
      summary: Get weather prediction
      description: Fetches real-time weather data, runs AI prediction, and stores the result
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude
      responses:
        "200":
          description: Weather data with AI prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherPredictionResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /weather/history:
    get:
      operationId: getWeatherHistory
      tags: [weather]
      summary: Get weather history
      description: Returns historical weather readings stored in the database
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of records to return
        - name: lat
          in: query
          required: false
          schema:
            type: number
          description: Filter by latitude (approximate)
        - name: lon
          in: query
          required: false
          schema:
            type: number
          description: Filter by longitude (approximate)
      responses:
        "200":
          description: List of historical weather readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherRecord"

  /weather/forecast:
    get:
      operationId: getWeatherForecast
      tags: [weather]
      summary: Get 7-day farm forecast
      description: Returns a 7-day daily forecast with farm action cards, field day scores, GDD, frost risk, irrigation needs, and disease pressure
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude
      responses:
        "200":
          description: 7-day farm forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /weather/alerts:
    get:
      operationId: getWeatherAlerts
      tags: [weather]
      summary: Get active weather alerts
      description: Returns prioritized weather alerts and crop warnings for the next 72 hours
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
          description: Latitude
        - name: lon
          in: query
          required: true
          schema:
            type: number
          description: Longitude
      responses:
        "200":
          description: Active weather alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /weather/stats:
    get:
      operationId: getWeatherStats
      tags: [weather]
      summary: Get weather statistics
      description: Returns aggregated statistics about collected weather data
      responses:
        "200":
          description: Weather statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    WeatherData:
      type: object
      properties:
        temperature:
          type: number
          description: Temperature in Celsius
        windspeed:
          type: number
          description: Wind speed in km/h
        humidity:
          type: number
          description: Relative humidity percentage
        pressure:
          type: number
          description: Surface pressure in hPa
        weathercode:
          type: integer
          description: WMO weather code
        time:
          type: string
          description: Observation time
      required:
        - temperature
        - windspeed
        - humidity
        - pressure
        - weathercode
        - time

    AIPrediction:
      type: object
      properties:
        prediction:
          type: string
          description: Human-readable weather prediction
        confidence:
          type: number
          description: Confidence score between 0 and 1
        reasoning:
          type: string
          description: Explanation of the prediction logic
        dataPoints:
          type: integer
          description: Number of historical records used to inform this prediction
          nullable: true
        modelVersion:
          type: string
          description: "AI model version: 'rules' = pure rule-based, 'rules+patterns' = blended, 'pattern-learned' = kNN dominant"
          nullable: true
      required:
        - prediction
        - confidence
        - reasoning

    WeatherPredictionResponse:
      type: object
      properties:
        weather:
          $ref: "#/components/schemas/WeatherData"
        prediction:
          $ref: "#/components/schemas/AIPrediction"
        location:
          type: object
          properties:
            lat:
              type: number
            lon:
              type: number
          required:
            - lat
            - lon
        recordId:
          type: integer
          description: Database ID of the stored record
      required:
        - weather
        - prediction
        - location
        - recordId

    WeatherRecord:
      type: object
      properties:
        id:
          type: integer
        latitude:
          type: number
        longitude:
          type: number
        temperature:
          type: number
        windspeed:
          type: number
        humidity:
          type: number
        pressure:
          type: number
        weathercode:
          type: integer
        prediction:
          type: string
        confidence:
          type: number
        reasoning:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - latitude
        - longitude
        - temperature
        - windspeed
        - humidity
        - pressure
        - weathercode
        - prediction
        - confidence
        - reasoning
        - createdAt

    DailyForecast:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        tempMax:
          type: number
        tempMin:
          type: number
        precipitationSum:
          type: number
          description: Total precipitation in mm
        precipitationProbability:
          type: number
          description: Max precipitation probability 0-100
        windspeedMax:
          type: number
          description: Max wind speed in km/h
        uvIndexMax:
          type: number
        weathercode:
          type: integer
        avgHumidity:
          type: number
          description: Average relative humidity 0-100
        fieldDayScore:
          type: number
          description: Farm field day score 0-10 (10 = perfect conditions)
        farmActions:
          type: array
          items:
            type: string
          description: Recommended farm actions for this day
        frostRisk:
          type: string
          enum: [none, low, moderate, high, severe]
        heatRisk:
          type: string
          enum: [none, low, moderate, high]
        diseasePressure:
          type: string
          enum: [low, moderate, high]
        irrigationNeeded:
          type: boolean
        sprayWindowOpen:
          type: boolean
          description: True if wind and rain conditions allow spraying
        gdd:
          type: number
          description: Growing Degree Days for this day (base 10°C)
      required:
        - date
        - tempMax
        - tempMin
        - precipitationSum
        - precipitationProbability
        - windspeedMax
        - uvIndexMax
        - weathercode
        - avgHumidity
        - fieldDayScore
        - farmActions
        - frostRisk
        - heatRisk
        - diseasePressure
        - irrigationNeeded
        - sprayWindowOpen
        - gdd

    ForecastResponse:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DailyForecast"
        cumulativeGDD:
          type: number
          description: Total Growing Degree Days accumulated over forecast period
        irrigationDeficit:
          type: number
          description: Water deficit in mm (ET0 - precipitation)
        latitude:
          type: number
        longitude:
          type: number
      required:
        - days
        - cumulativeGDD
        - irrigationDeficit
        - latitude
        - longitude

    WeatherAlert:
      type: object
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        type:
          type: string
          enum: [frost, heat, heavy_rain, strong_wind, disease, irrigation, spray_window, harvest_window]
        title:
          type: string
        message:
          type: string
        actionRequired:
          type: string
          description: Specific action the farmer should take
        validFrom:
          type: string
          description: Date or datetime when alert is valid from
        validUntil:
          type: string
          description: Date or datetime when alert expires
        daysAhead:
          type: integer
          description: How many days until this event occurs
      required:
        - id
        - severity
        - type
        - title
        - message
        - actionRequired
        - validFrom
        - validUntil
        - daysAhead

    AlertsResponse:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/WeatherAlert"
        activeCount:
          type: integer
        criticalCount:
          type: integer
      required:
        - alerts
        - activeCount
        - criticalCount

    WeatherStats:
      type: object
      properties:
        totalReadings:
          type: integer
          description: Total number of weather readings stored
        avgTemperature:
          type: ["number", "null"]
          description: Average temperature across all readings
        avgWindspeed:
          type: ["number", "null"]
          description: Average wind speed across all readings
        avgHumidity:
          type: ["number", "null"]
          description: Average humidity across all readings
        predictionBreakdown:
          type: object
          additionalProperties:
            type: integer
          description: Count of each prediction type
        lastReading:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent reading
      required:
        - totalReadings
        - avgTemperature
        - avgWindspeed
        - avgHumidity
        - predictionBreakdown
        - lastReading
